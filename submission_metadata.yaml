  platform: "Local x86_64 / Docker (python:3.11-alpine)"  # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                            # Number of CPU cores used
  ram_gb: 16                                              # Available RAM in GB
  python_version: "3.11"                                  # python --version
  os: "Linux (Docker) / Windows 11 (local dev)"           # Or "Ubuntu 22.04 LTS", etc.

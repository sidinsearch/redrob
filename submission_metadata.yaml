  has_network_during_ranking: false                       # Must be false — no API calls during ranking
  pre_computation_required: false                         # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0                         # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest. Stage 5 interview
# may verify these declarations against your code; declarations that contradict
# your code or your interview are flagged.
ai_tools_used:
  - "Claude"        # e.g. for architecture discussion, code review
  # Other options: "ChatGPT", "Cursor", "Gemini", "Codeium", "GitHub Copilot", "Other", "None"

ai_usage_summary: |
  AI tools (Claude Code) used for:
  - Architecture discussion and review
  - Code structure planning and refactoring
  - Documentation drafting (README, METHODOLOGY, EVALUATION)
  - Debugging during development

  No candidate data was fed to any LLM during the build. The ranker code
  was written by a human with AI assistance; the design decisions (weights,
  trap thresholds, scoring formula) are documented in src/config.py and
  docs/METHODOLOGY.md. All numbers in the ranker are constants tuned
  against the dataset description in the JD, not against any LLM output.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Stdlib-only, CPU-only, no-network ranker. Rule-based weighted scoring
  with explicit trap detection, must-have gating, and honeypot exclusion.

  Pipeline: (1) JSONL streaming parser; (2) per-candidate feature extraction
  (70+ signals); (3) evidence-based must-have detector — 4 must-haves
  requiring sentences in career_history, 5 nice-to-haves, plus hard
  disqualifiers (research-only, consulting-only, CV/speech/robotics primary,
  LangChain <12mo, no production code 18mo); (4) fit_score 0–100, gated on
  must-haves met (4/4→[80,100], 3/4→[55,75], 2/4→[30,50], 1/4→[10,25],
  0/4→[0,10]); (5) 4 multiplicative traps (stuffer ×0.40, template ×0.70,
  consulting ×0.75, chaser ×0.85) + 12 honeypot flags. Honeypots are
  excluded from top-K via `continue` before `topk.offer()` — an
  architectural guarantee, not a score threshold; (6) availability filter
  (open_to_work 40% · notice_period 25% · response 20% · recency 15%).

  Final = (fit/100) × availability. Top-100 by (score desc, candidate_id
  asc); 8 reasoning templates × 4 rank tiers for the ≤300-char "why".

  Performance: ~35s on 100K pool (8.5× under the 5-min budget), ~1.5 GB
  peak memory, zero network calls. 100% stdlib for the ranker; sandbox
  adds 3 deps (streamlit, pandas, plotly). 40/40 tests pass in <0.2s.


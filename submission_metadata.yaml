# ----------------------------------------------------------------------------
# 3. Reproducibility
# ----------------------------------------------------------------------------
# The single command that produces submission.csv from the candidates file.
# Verified on a 100K-row pool in ~35 s on a 16 GB CPU-only machine.
reproduce_command: "python rank.py --candidates ./candidates.jsonl --out ./output/submission.csv"

# Alternative one-shot via Docker (no host Python needed):
reproduce_docker_command: |
  docker build -t redrob-ranker .
  docker run --rm \
    -v /path/to/candidates.jsonl:/data/candidates.jsonl:ro \
    -v $(pwd)/output:/output \
    redrob-ranker \
    python rank.py --candidates /data/candidates.jsonl --out /output/submission.csv

# Live demo (interactive sandbox):
reproduce_sandbox_command: "streamlit run app.py"


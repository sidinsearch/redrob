# ----------------------------------------------------------------------------
# 7. Approach summary
# ----------------------------------------------------------------------------
approach: "Rule-based weighted scoring with explicit trap detection and honeypot exclusion"

methodology_summary: |
  Stdlib-only, CPU-only, no-network ranker. Pure rule-based weighted
  scoring with explicit trap detection, must-have gating, and honeypot
  exclusion. Pipeline:

  1. Parse     — JSONL streaming reader
  2. Features  — 70+ signals per candidate (76 fields in Features dataclass)
  3. Must-haves — evidence-based detector (4 must-haves requiring
                  sentences in career_history, 5 nice-to-haves,
                  + hard disqualifiers for research-only, consulting-only,
                  CV/speech/robotics primary, LangChain <12 mo,
                  no production code 18 mo)
  4. Fit-score  — 0-100, gated on must-haves met (tier baselines:
                  4/4→[80,100], 3/4→[55,75], 2/4→[30,50],
                  1/4→[10,25], 0/4→[0,10])
  5. Traps     — 4 multiplicative traps (stuffer ×0.40, template ×0.70,
                  consulting ×0.75, chaser ×0.85) + 12 honeypot flags
                  (career-timeline anomaly, expert-with-zero-duration,
                  title-skills mismatch, etc.). Honeypots are excluded
                  from top-K via `continue` before `topk.offer()` —
                  an architectural guarantee, not a score threshold.
  6. Availability — additive filter (open_to_work 40% · notice_period
                    25% · recruiter_response 20% · recency 15%),
                    clipped to [0.1, 1.0]

  Final score per audit spec:
    final_score = (fit_score / 100) × availability_multiplier

  Sort top-100 by (score desc, candidate_id asc), then 8 reasoning
  templates × 4 rank tiers produce a ≤300-char "why" for each row.

  Performance: ~35 s on 100K pool (8.5× under the 5-min budget),
  ~1.5 GB peak memory, zero network calls. 100% stdlib for the ranker
  itself; the Streamlit sandbox adds 3 deps (streamlit, pandas, plotly).

# ----------------------------------------------------------------------------
# 8. Traps and honeypot detectors
# ----------------------------------------------------------------------------
traps:
  - name: "honeypot"
    description: "Impossible profile (12 detectors) — excluded from top-K, not multiplied"
    detectors:
      - "career_timeline_anomaly"
      - "expert_with_zero_duration"
      - "title_skills_history_mismatch"
      - "employment_overlap_anomaly"
      - "duration_integrity_violation"
      - "title_responsibility_mismatch"
      - "skill_experience_contradiction"
      - "education_timeline_anomaly"
      - "career_progression_anomaly"
      - "achievement_inflation"
      - "technology_age_anomaly"
      - "synthetic_profile"
      - "cross_field_inconsistency"
      - "nlp_claim_without_evidence"
  - name: "keyword_stuffer"
    multiplier: 0.40
    description: "Non-technical title + 4+ AI skills + zero foundational ML"
  - name: "template_summary"
    multiplier: 0.70
    description: "Canned 'curious about AI tools' phrasing"
  - name: "consulting_only"
    multiplier: 0.75
    description: "All employers are TCS / Infosys / Wipro / Accenture / Cognizant"
  - name: "title_chaser"
    multiplier: 0.85
    description: "4+ jobs in last 8 yr, avg tenure <18 months"
  - name: "trap_floor"
    multiplier: 0.30
    description: "Floor when multiple traps multiply"

# ----------------------------------------------------------------------------
# 9. Must-haves (the audit-spec gates for fit_score)
# ----------------------------------------------------------------------------
must_haves:
  - key: "embeddings_retrieval"
    description: "Production embeddings-based retrieval (sentence-transformers / BGE / OpenAI / Cohere)"
  - key: "vector_db"
    description: "Production vector DB / hybrid search (FAISS, Pinecone, Weaviate, Qdrant, Milvus, Elasticsearch-knn)"
  - key: "ranking_eval"
    description: "Eval framework design for ranking (offline metrics, A/B, NDCG/MRR/MAP, test sets)"
  - key: "strong_python"
    description: "Strong Python in a real system (PyTorch / TensorFlow / NumPy / Pandas / Spark / production codebase)"

nice_to_haves:
  - "FAISS / vector index"
  - "PyTorch / TensorFlow"
  - "search infrastructure (Elasticsearch / OpenSearch)"
  - "production RAG / LLM serving"
  - "experiment tracking (MLflow / W&B / Weights & Biases)"

hard_disqualifiers:
  - "research-only career (PhD with no production code)"
  - "consulting-only career (TCS/Infosys/Wipro/Accenture/Cognizant)"
  - "primary focus on CV / speech / robotics (off-JD)"
  - "LangChain experience <12 months total"
  - "no production code in last 18 months"


# ----------------------------------------------------------------------------
# 11. Key design decisions (for Stage 5 defense)
# ----------------------------------------------------------------------------
key_decisions:
  - "Rule-based over neural embeddings: the JD's own phrasing ('we've tried
     BM25 + rule-based') is the rubric. Rule-based is defensible at Stage 5,
     fits the 5-min CPU budget, and doesn't require pre-computed artifacts."
  - "Must-haves are evidence-based, not skill-list keyword matching — a
     candidate with 'PyTorch' in skills but no production code in career
     history does NOT satisfy the must-have. This kills the 'keyword stuffer'
     trap (the most common dataset poison)."
  - "Honeypot exclusion is architectural (`continue` before `topk.offer()`),
     not a score threshold. Even a honeypot with a perfect fit_score cannot
     appear in the top-100."
  - "Pure stdlib for the ranker (rank.py + src/). Zero dependency drift at
     Stage 3 reproduction. The Streamlit sandbox adds 3 deps, all pinned."
  - "Final score = (fit / 100) × availability, with availability as a
     multiplicative filter (not additive) per the audit spec."

# ----------------------------------------------------------------------------
# 12. AI tools declaration
# ----------------------------------------------------------------------------
ai_tools_used:
  - "Claude (Anthropic)"
  - "OpenCode (open-source agent runtime)"

ai_usage_summary: |
  AI tools (Claude, OpenCode) used for:
  - Architecture discussion and review
  - Code structure planning and refactoring
  - Documentation drafting (README, METHODOLOGY, EVALUATION)
  - Debugging during development

  No candidate data was fed to any LLM during the build. The ranker code
  was written by a human with AI assistance; the design decisions (weights,
  trap thresholds, scoring formula) are documented in src/config.py and
  docs/METHODOLOGY.md. All numbers in the ranker are constants tuned
  against the dataset description in the JD, not against any LLM output.

